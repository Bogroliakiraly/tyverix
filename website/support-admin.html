<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BoostForge — Support inbox (admin)</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #0a0b0f; --surface: #121419; --elevated: #181b22; --border: #242833;
        --accent: #5b8cff; --accent-hover: #6f9bff; --good: #3ddc84; --warn: #f5b14c;
        --text: #eef1f7; --text-2: #9aa3b2; --text-3: #5f6776;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: "Inter", system-ui, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; }
      a { color: inherit; text-decoration: none; }
      .wrap { max-width: 820px; margin: 0 auto; padding: 0 24px; }
      nav { border-bottom: 1px solid var(--border); background: rgba(10,11,15,0.72); backdrop-filter: blur(12px); }
      nav .bar { max-width: 1120px; margin: 0 auto; padding: 0 24px; height: 64px; display: flex; align-items: center; justify-content: space-between; }
      .logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 18px; }
      .logo .mark { width: 30px; height: 30px; border-radius: 9px; background: rgba(91,140,255,0.18); display: grid; place-items: center; }
      main { padding: 48px 0; }
      h1 { font-size: 24px; font-weight: 800; }
      .muted { color: var(--text-2); font-size: 14px; }
      .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; border-radius: 11px; padding: 12px 18px; font-weight: 600; font-size: 14px; cursor: pointer; border: none; font-family: inherit; }
      .btn-primary { background: var(--accent); color: #fff; }
      .btn-primary:hover { background: var(--accent-hover); }
      .btn-ghost { background: transparent; color: var(--text-2); border: 1px solid var(--border); }
      .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 22px; }
      .msg { border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; margin-top: 12px; background: var(--bg); }
      .msg.handled { opacity: 0.55; }
      .msg .meta { display: flex; align-items: center; justify-content: space-between; gap: 10px; font-size: 12px; color: var(--text-3); margin-bottom: 6px; }
      .msg .body { white-space: pre-wrap; font-size: 14px; }
      .pill { font-size: 11px; border-radius: 999px; padding: 3px 9px; cursor: pointer; border: 1px solid var(--border); background: var(--elevated); color: var(--text-2); }
      .hidden { display: none !important; }
      .row { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 18px; }
    </style>
  </head>
  <body>
    <nav>
      <div class="bar">
        <a class="logo" href="index.html"><span class="mark">⚡</span> BoostForge</a>
        <a class="muted" href="account.html">← Account</a>
      </div>
    </nav>

    <main>
      <div class="wrap">
        <div class="row">
          <h1>Support inbox</h1>
          <button id="signOutBtn" class="btn btn-ghost hidden">Sign out</button>
        </div>

        <!-- Signed out -->
        <div id="loginView" class="card hidden">
          <p class="muted" style="margin-bottom:14px">Owner access only. Sign in with the project's GitHub account.</p>
          <button id="githubBtn" class="btn btn-primary">Sign in with GitHub</button>
        </div>

        <!-- Not the owner -->
        <div id="deniedView" class="card hidden">
          <p style="color:var(--warn); font-weight:600">Access denied</p>
          <p class="muted" style="margin-top:6px">This account isn't the support admin. Signing you out…</p>
        </div>

        <!-- Admin inbox -->
        <div id="inboxView" class="hidden">
          <p class="muted" id="inboxMeta"></p>
          <div id="list"></div>
        </div>

        <div id="notConfigured" class="card hidden">
          <p class="muted">Accounts aren't configured yet.</p>
        </div>
      </div>
    </main>

    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
    <script>
      const $ = (id) => document.getElementById(id);
      function esc(s) {
        return String(s == null ? "" : s).replace(/[&<>"']/g, (c) =>
          ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]),
        );
      }

      async function renderList() {
        let msgs = [];
        try { msgs = await window.bfAuth.listSupport(); } catch (e) {}
        $("inboxMeta").textContent = msgs.length + " message(s)";
        $("list").innerHTML = msgs
          .map(
            (m) => `
            <div class="msg ${m.handled ? "handled" : ""}">
              <div class="meta">
                <span>${esc(m.email || "—")} · ${new Date(m.created_at).toLocaleString()}</span>
                <span class="pill" data-id="${esc(m.id)}" data-h="${m.handled ? 1 : 0}">${m.handled ? "Handled ✓" : "Mark handled"}</span>
              </div>
              <div class="body">${esc(m.message)}</div>
            </div>`,
          )
          .join("") || '<p class="muted" style="margin-top:12px">No messages yet.</p>';

        document.querySelectorAll(".pill").forEach((el) =>
          el.addEventListener("click", async () => {
            await window.bfAuth.setHandled(el.dataset.id, el.dataset.h !== "1");
            renderList();
          }),
        );
      }

      async function route() {
        if (!window.bfAuth || !window.bfAuth.configured) {
          $("notConfigured").classList.remove("hidden");
          return;
        }
        const user = await window.bfAuth.user();
        if (!user) {
          $("loginView").classList.remove("hidden");
          $("inboxView").classList.add("hidden");
          $("signOutBtn").classList.add("hidden");
          return;
        }
        $("loginView").classList.add("hidden");
        $("signOutBtn").classList.remove("hidden");

        const admin = await window.bfAuth.isAdmin();
        if (!admin) {
          $("deniedView").classList.remove("hidden");
          setTimeout(async () => { await window.bfAuth.signOut(); location.reload(); }, 2500);
          return;
        }
        $("inboxView").classList.remove("hidden");
        renderList();
      }

      $("githubBtn").addEventListener("click", () =>
        window.bfAuth.signInWithGitHub(window.location.href).catch((e) => alert(e.message || e)),
      );
      $("signOutBtn").addEventListener("click", async () => {
        await window.bfAuth.signOut();
        location.reload();
      });

      route();
    </script>
  </body>
</html>
