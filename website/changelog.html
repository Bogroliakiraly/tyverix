<!doctype html>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tyverix Changelog — What's New</title>
    <meta name="description" content="Every Tyverix release, what changed and when — new features, fixes and improvements to the honest Windows gaming optimizer." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://tyverix.com/changelog.html" />
    <link rel="icon" href="favicon-32.png" type="image/png" sizes="32x32" />
    <link rel="icon" href="favicon-192.png" type="image/png" sizes="192x192" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #0a0b0f; --surface: #121419; --elevated: #181b22; --border: #242833;
        --accent: #5b8cff; --accent-hover: #6f9bff; --good: #3ddc84; --warn: #f5b14c;
        --text: #eef1f7; --text-2: #9aa3b2; --text-3: #5f6776;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: "Inter", system-ui, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; }
      a { color: inherit; text-decoration: none; }
      .wrap { max-width: 760px; margin: 0 auto; padding: 0 24px; }
      nav { border-bottom: 1px solid var(--border); background: rgba(10,11,15,0.72); backdrop-filter: blur(12px); position: sticky; top: 0; }
      nav .bar { max-width: 1120px; margin: 0 auto; padding: 0 24px; height: 64px; display: flex; align-items: center; justify-content: space-between; }
      .logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 18px; }
      .logo .mark { width: 32px; height: 32px; object-fit: contain; display: block; }
      .langs { display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 3px; }
      .langs button { background: none; border: none; color: var(--text-2); cursor: pointer; font-size: 13px; padding: 4px 9px; border-radius: 7px; font-family: inherit; }
      .langs button.active { background: var(--elevated); color: var(--text); }
      .back { display: inline-block; margin-top: 28px; color: var(--text-2); font-size: 14px; }
      .back:hover { color: var(--text); }
      main { padding: 0 0 80px; }
      h1 { font-size: 30px; font-weight: 800; letter-spacing: -0.01em; }
      .sub { color: var(--text-2); margin-top: 8px; font-size: 15px; }
      .entry { position: relative; padding: 28px 0 28px 26px; border-left: 2px solid var(--border); }
      .entry:first-child { padding-top: 36px; }
      .entry:last-child { border-left-color: transparent; }
      .entry::before {
        content: ""; position: absolute; left: -7px; top: 34px; width: 12px; height: 12px;
        border-radius: 50%; background: var(--accent); box-shadow: 0 0 0 4px rgba(91,140,255,0.18);
      }
      .entry:first-child::before { background: var(--good); box-shadow: 0 0 0 4px rgba(61,220,132,0.18); }
      .ver-row { display: flex; align-items: baseline; gap: 10px; margin-bottom: 10px; }
      .ver { font-size: 18px; font-weight: 700; }
      .date { font-size: 13px; color: var(--text-3); }
      .badge-latest {
        font-size: 11px; font-weight: 600; color: var(--good); background: rgba(61,220,132,0.14);
        border: 1px solid rgba(61,220,132,0.35); border-radius: 999px; padding: 2px 9px;
      }
      ul.changes { list-style: none; display: grid; gap: 8px; }
      ul.changes li { font-size: 14px; color: var(--text-2); display: flex; gap: 10px; }
      ul.changes li .dot { color: var(--accent); flex-shrink: 0; }
    </style>
  </head>

          <button data-lang="de">DE</button>
        </div>
      </div>
    </nav>

        <div id="list"></div>

      function render(lang) {
        const d = DATA[lang] || DATA.en;
        document.documentElement.lang = lang;
        document.getElementById("pageTitle").textContent = d.title;
        document.getElementById("pageSub").textContent = d.sub;
        document.getElementById("backLink").textContent = d.back;
        document.getElementById("list").innerHTML = d.entries
          .map(
            (e, i) => `
            <div class="entry">
              <div class="ver-row">
                <span class="ver">v${e.v}</span>
                <span class="date">${e.date}</span>
                ${i === 0 ? `<span class="badge-latest">${d.latest}</span>` : ""}
              </div>
              <ul class="changes">
                ${e.items.map((it) => `<li><span class="dot">&#8226;</span><span>${it}</span></li>`).join("")}
              </ul>
            </div>`,
          )
          .join("");
        document.querySelectorAll("#langs button").forEach((b) => b.classList.toggle("active", b.dataset.lang === lang));
        try { localStorage.setItem("bf.site.lang", lang); } catch (e) {}
      }

      document.querySelectorAll("#langs button").forEach((b) =>
        b.addEventListener("click", () => render(b.dataset.lang)),
      );

      let saved = null;
      try { saved = localStorage.getItem("bf.site.lang"); } catch (e) {}
      const sys = (navigator.language || "en").slice(0, 2);
      render(saved || (["hu", "de"].includes(sys) ? sys : "en"));

</html>
